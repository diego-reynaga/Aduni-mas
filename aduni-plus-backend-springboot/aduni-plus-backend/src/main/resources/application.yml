server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: aduni-plus-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aduniplus?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  cors:
    allowed-origins: http://localhost:4200
  jwt:
    secret: ${JWT_SECRET:cambiar-esta-clave-por-una-clave-segura-de-256-bits-minimo}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  seed:
    enabled: ${SEED_ENABLED:true}
