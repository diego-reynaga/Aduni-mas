server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: aduni-plus-backend

  datasource:
    url: jdbc:mysql://localhost:3306/aduni_plus?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  cors:
    allowed-origins: http://localhost:4200
  jwt:
    secret: cambiar-esta-clave-por-una-clave-segura-de-256-bits-minimo
    expiration-ms: 86400000
  uploads:
    recibos: uploads/recibos/
